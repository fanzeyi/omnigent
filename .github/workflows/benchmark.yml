name: Benchmark (ad-hoc, fork)

# Throwaway fork-only copy of .github/workflows/benchmark.yml used to ad-hoc
# validate the SQLite seed-perf change on a GitHub-hosted runner. Lives only
# on the `ci/benchmark-adhoc` branch of the fork and is never merged.
#
# Differences from the upstream workflow:
#   - no `github.repository == 'omnigent-ai/omnigent'` guard (so it runs on the fork);
#   - sqlite-only matrix (the seed fast path is SQLite-only; the postgres/mysql
#     legs are slow-path fresh-service backends with no validation value here);
#   - drops the databricks/mysql extra + driver installs (sqlite needs neither);
#   - prints the seed wall-time in the step log for direct read.

on:
  workflow_dispatch:
    inputs:
      checkout_sha:
        description: "Commit SHA to benchmark (blank = branch HEAD)"
        required: false
        default: ""
      iterations:
        description: "Requests per run"
        required: false
        default: "100"
      runs:
        description: "Timed runs per journey"
        required: false
        default: "3"
      sessions:
        description: "Seeded sessions"
        required: false
        default: "5000"
      items_per_session:
        description: "Seeded items per session"
        required: false
        default: "200"

permissions:
  contents: read

env:
  OMNIGENT_SKIP_WEB_UI: "true"
  UV_INDEX_URL: https://pypi.org/simple
  PIP_INDEX_URL: https://pypi.org/simple
  ITERATIONS: ${{ inputs.iterations }}
  RUNS: ${{ inputs.runs }}
  SESSIONS: ${{ inputs.sessions }}
  ITEMS: ${{ inputs.items_per_session }}

concurrency:
  group: benchmark-adhoc-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  benchmark:
    name: Run benchmark (sqlite)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Resolve DB target
        id: db
        run: |
          HEAD="$(uv run --no-sync dev/benchmarks/omnigent/seed.py --print-head)"
          echo "uri=sqlite:///$PWD/bench.db" >> "$GITHUB_OUTPUT"
          echo "cache_path=bench.db" >> "$GITHUB_OUTPUT"
          echo "cache_key=benchdb-sqlite-${HEAD}-${SESSIONS}x${ITEMS}-${{ hashFiles('dev/benchmarks/omnigent/seed.py') }}" >> "$GITHUB_OUTPUT"

      - name: Restore seeded SQLite corpus
        id: seedcache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ${{ steps.db.outputs.cache_path }}
          key: ${{ steps.db.outputs.cache_key }}

      - name: Seed corpus
        if: steps.seedcache.outputs.cache-hit != 'true'
        run: |
          echo "::group::seed timing"
          /usr/bin/time -v uv run --no-sync dev/benchmarks/omnigent/seed.py \
            --database-uri "${{ steps.db.outputs.uri }}" \
            --sessions "$SESSIONS" --items-per-session "$ITEMS"
          echo "::endgroup::"

      - name: Run benchmark
        run: |
          uv run --no-sync dev/benchmarks/omnigent/run.py \
            --database-uri "${{ steps.db.outputs.uri }}" \
            --iterations "$ITERATIONS" \
            --runs "$RUNS" \
            --output "benchmark-results-sqlite.json"

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: benchmark-results-sqlite-${{ github.run_id }}
          path: benchmark-results-sqlite.json
          retention-days: 30
          if-no-files-found: warn
